<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Método dos 3 Horizontes - Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* --- ESTILOS ORIGINAIS MANTIDOS PARA CONSISTÊNCIA --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1a56db; --primary-light: #e8f0fe; --accent: #f97316;
  --bg: #f0f4ff; --surface: #ffffff; --border: #dde3f0;
  --text: #0f172a; --text-muted: #64748b; --shadow: 0 4px 24px rgba(26,86,219,0.10);
  --radius: 14px; --sidebar-w: 112px;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
.header { display:flex; align-items:center; justify-content:space-between; padding:11px 22px; background:var(--surface); border-bottom:1.5px solid var(--border); flex-shrink:0; z-index:100; gap:14px; }
.header-left { display:flex; flex-direction:column; gap:1px; }
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:0.95rem; color:var(--primary); letter-spacing:-0.5px; white-space:nowrap; }
.logo span { color:var(--accent); }
.client-name-input { font-family:'DM Sans',sans-serif; font-size:0.76rem; color:var(--text-muted); border:none; outline:none; background:transparent; font-weight:400; width:200px; padding:0; }
.header-controls { display:flex; align-items:center; gap:8px; }
.btn { display:inline-flex; align-items:center; gap:5px; padding:6px 13px; border-radius:8px; font-size:0.8rem; font-weight:500; cursor:pointer; border:none; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-ghost { background:transparent; color:var(--text-muted); border:1.5px solid var(--border); }
.app-body { display:flex; flex:1; overflow:hidden; }
.sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1.5px solid var(--border); display:flex; flex-direction:column; align-items:center; padding-bottom:16px; gap:8px; flex-shrink:0; }
.tab { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; width:82px; padding:15px 6px; font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; cursor:pointer; border:2px solid transparent; background:var(--bg); color:var(--text-muted); border-radius:14px; transition:all 0.22s; position:relative; }
.tab.active { color:var(--primary); background:var(--primary-light); border-color:var(--primary); }
.main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.canvas-panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
.canvas-panel.active { display:flex; }
.panel-topbar { display:flex; align-items:center; gap:12px; padding:12px 22px; background:var(--surface); border-bottom:1.5px solid var(--border); }
.canvas-board { flex:1; position:relative; overflow:hidden; background: #f8fafc; }
.canvas-viewport { position:absolute; inset:0; transform-origin:0 0; }
.s-card { position:absolute; background:var(--surface); border-radius:var(--radius); border:2px solid var(--border); box-shadow:var(--shadow); min-width:220px; z-index:10; display:flex; flex-direction:column; }
.card-header { padding:10px; cursor:grab; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.card-title-input { border:none; outline:none; font-weight:bold; width:100%; font-size:0.85rem; }
.card-body { padding:10px; flex:1; }
.card-text-input { width:100%; min-height:60px; border:1px solid var(--border); border-radius:6px; padding:5px; font-size:0.8rem; resize:none; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; opacity:0; transition:0.3s; z-index:1000; pointer-events:none; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">Método dos 3 Horizontes <span>·</span></div>
    <input class="client-name-input" id="clientNameInput" placeholder="Nome do cliente..." maxlength="60">
  </div>
  <div class="header-controls">
    <button class="btn btn-ghost" id="exportPngBtn">🖼️ PNG</button>
    <input type="color" id="globalColorPicker" value="#1a56db" style="width:30px; border:none; cursor:pointer;">
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div style="height:20px"></div>
    <button class="tab active" data-hz="h1">H1<span style="font-size:10px">Atual</span></button>
    <button class="tab" data-hz="h2">H2<span style="font-size:10px">Transição</span></button>
    <button class="tab" data-hz="h3">H3<span style="font-size:10px">Futuro</span></button>
  </aside>

  <main class="main-content">
    <div class="canvas-panel active">
      <div class="panel-topbar">
        <h2 id="horizonTitle">Horizonte 1</h2>
        <button class="btn btn-primary" id="addCardBtn">＋ Novo Card</button>
      </div>
      <div class="canvas-board" id="board-container">
        <div class="canvas-viewport" id="viewport">
            <svg id="connections-layer" style="position:absolute; width:4000px; height:4000px; pointer-events:none;"></svg>
            <div id="card-layer" style="position:absolute; width:4000px; height:4000px;"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// --- FIREBASE SETUP ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCIkrm9XqMYdzHu3ZCqVRUqG7AKpApwWBY",
  authDomain: "rodrigo-bb472.firebaseapp.com",
  projectId: "rodrigo-bb472",
  storageBucket: "rodrigo-bb472.firebasestorage.app",
  messagingSenderId: "428878059704",
  appId: "1:428878059704:web:3657cf5fa32ef8097f3c4d",
  measurementId: "G-M42RJBQJ0H"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// --- APP STATE ---
let currentHz = 'h1';
let state = {
    h1: { cards: [] }, h2: { cards: [] }, h3: { cards: [] }
};
let view = { x: 50, y: 50, zoom: 1 };

// --- CORE FUNCTIONS ---
const showToast = (m) => { const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast show'; setTimeout(() => t.className = 'toast', 2000); };

async function saveAll() {
    const data = {
        state, 
        clientName: document.getElementById('clientNameInput').value,
        themeColor: document.getElementById('globalColorPicker').value,
        updatedAt: new Date().toISOString()
    };
    try {
        await setDoc(doc(db, "projeto", "atual"), data);
        localStorage.setItem('backup_3h', JSON.stringify(data));
        showToast("Salvo na nuvem");
    } catch(e) { console.error(e); }
}

async function loadAll() {
    const snap = await getDoc(doc(db, "projeto", "atual"));
    if (snap.exists()) {
        const d = snap.data();
        state = d.state;
        document.getElementById('clientNameInput').value = d.clientName || '';
        document.getElementById('globalColorPicker').value = d.themeColor || '#1a56db';
        render();
    }
}

function render() {
    const layer = document.getElementById('card-layer');
    layer.innerHTML = '';
    state[currentHz].cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 's-card';
        div.style.left = card.x + 'px';
        div.style.top = card.y + 'px';
        div.innerHTML = `
            <div class="card-header"><input class="card-title-input" value="${card.title}"></div>
            <div class="card-body">
                <textarea class="card-text-input">${card.text || ''}</textarea>
            </div>
        `;
        
        // Simples drag logic
        div.onmousedown = (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            let sx = e.clientX, sy = e.clientY;
            document.onmousemove = (em) => {
                card.x += (em.clientX - sx);
                card.y += (em.clientY - sy);
                div.style.left = card.x + 'px';
                div.style.top = card.y + 'px';
                sx = em.clientX; sy = em.clientY;
            };
            document.onmouseup = () => { document.onmousemove = null; saveAll(); };
        };
        
        layer.appendChild(div);
    });
}

// --- EVENTS ---
document.getElementById('addCardBtn').onclick = () => {
    state[currentHz].cards.push({ id: Date.now(), title: 'Novo Card', x: 100, y: 100, text: '' });
    render();
    saveAll();
};

document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentHz = tab.dataset.hz;
        document.getElementById('horizonTitle').textContent = "Horizonte " + currentHz.replace('h','');
        render();
    };
});

document.getElementById('exportPngBtn').onclick = () => {
    html2canvas(document.getElementById('board-container')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'mapa-3h.png';
        link.href = canvas.toDataURL();
        link.click();
    });
};

// --- INIT ---
window.onload = loadAll;
</script>
</body>
</html>
